name: Release

on:
  push:
    branches: [main]
    paths:
      - VERSION
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Tag · Build universal macOS package · Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: ver
        shell: bash
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "VERSION must look like 1.2.3 or 1.2.3-beta.1; got '$VERSION'" >&2
            exit 1
          fi
          BUILD_NUMBER=${GITHUB_RUN_NUMBER}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Check tag exists
        id: tag_check
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.ver.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.tag_check.outputs.exists == 'false'
        id: notes
        shell: bash
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges)
          else
            COMMITS=$(git log --oneline --no-merges)
          fi

          NOTES=$(mktemp)
          TODAY=$(date +%Y-%m-%d)
          printf "## %s (%s)\n\n" "${{ steps.ver.outputs.version }}" "$TODAY" >> "$NOTES"

          FEAT_LINES=""
          FIX_LINES=""
          OTHER_LINES=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            HASH=$(echo "$line" | cut -d' ' -f1)
            MSG=$(echo "$line" | cut -d' ' -f2-)

            if echo "$MSG" | grep -qiE "^feat(\([^)]*\))?:"; then
              CLEAN=$(echo "$MSG" | sed -E 's/^feat\(([^)]+)\): /\1: /i; s/^feat: //i')
              FEAT_LINES="${FEAT_LINES}- ${CLEAN} (${HASH})\n"
            elif echo "$MSG" | grep -qiE "^fix(\([^)]*\))?:"; then
              CLEAN=$(echo "$MSG" | sed -E 's/^fix\(([^)]+)\): /\1: /i; s/^fix: //i')
              FIX_LINES="${FIX_LINES}- ${CLEAN} (${HASH})\n"
            else
              OTHER_LINES="${OTHER_LINES}- ${MSG} (${HASH})\n"
            fi
          done <<< "$COMMITS"

          if [ -n "$FIX_LINES" ]; then
            printf "## Bug Fixes\n\n" >> "$NOTES"
            printf "%b\n" "$FIX_LINES" >> "$NOTES"
          fi

          if [ -n "$FEAT_LINES" ]; then
            printf "## Features\n\n" >> "$NOTES"
            printf "%b\n" "$FEAT_LINES" >> "$NOTES"
          fi

          if [ -n "$OTHER_LINES" ]; then
            printf "## Changes\n\n" >> "$NOTES"
            printf "%b\n" "$OTHER_LINES" >> "$NOTES"
          fi

          if [ -z "$FIX_LINES" ] && [ -z "$FEAT_LINES" ] && [ -z "$OTHER_LINES" ]; then
            printf "No user-facing changes.\n" >> "$NOTES"
          fi

          echo "notes_path=${NOTES}" >> "$GITHUB_OUTPUT"
          cat "$NOTES"

      - name: Select Xcode
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          for app in /Applications/Xcode_16*.app /Applications/Xcode.app; do
            if [ -d "$app" ]; then
              sudo xcode-select -s "$app/Contents/Developer"
              break
            fi
          done
          xcodebuild -version
          swiftc -version

      - name: Build universal macOS app
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          DERIVED_DATA="$RUNNER_TEMP/ZnakDerivedData"
          xcodebuild \
            -project Znak.xcodeproj \
            -scheme Znak \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            -destination 'generic/platform=macOS' \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY='-' \
            CODE_SIGN_STYLE=Manual \
            MARKETING_VERSION='${{ steps.ver.outputs.version }}' \
            CURRENT_PROJECT_VERSION='${{ steps.ver.outputs.build_number }}' \
            SWIFT_VERSION='5.0' \
            clean build

          APP="$DERIVED_DATA/Build/Products/Release/Znak.app"
          test -d "$APP"
          lipo -archs "$APP/Contents/MacOS/Znak" | tee "$RUNNER_TEMP/archs.txt"
          grep -q arm64 "$RUNNER_TEMP/archs.txt"
          grep -q x86_64 "$RUNNER_TEMP/archs.txt"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP/Contents/Info.plist"
          echo "app_path=$APP" >> "$GITHUB_ENV"

      - name: Package release artifacts
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ steps.ver.outputs.version }}'
          DIST="$RUNNER_TEMP/dist"
          mkdir -p "$DIST"

          ditto -c -k --keepParent "$app_path" "$DIST/Znak-${VERSION}-macos-universal.app.zip"
          pkgbuild \
            --component "$app_path" \
            --install-location "/Library/Input Methods" \
            "$DIST/Znak-${VERSION}-macos-universal.pkg"

          shasum -a 256 "$DIST"/* > "$DIST/SHA256SUMS.txt"
          echo "dist=$DIST" >> "$GITHUB_ENV"
          ls -lh "$DIST"

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          draft: false
          prerelease: false
          files: |
            ${{ env.dist }}/Znak-${{ steps.ver.outputs.version }}-macos-universal.app.zip
            ${{ env.dist }}/Znak-${{ steps.ver.outputs.version }}-macos-universal.pkg
            ${{ env.dist }}/SHA256SUMS.txt

      - name: Report existing release
        if: steps.tag_check.outputs.exists == 'true'
        shell: bash
        run: echo "${{ steps.ver.outputs.tag }} already exists; skipping release."
